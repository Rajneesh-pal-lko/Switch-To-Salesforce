<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Contact Switch To Salesforce — newsletter subscription via the API." />
    <title>Switch To Salesforce — Contact</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="contact">
    <div data-include="navbar"></div>
    <div class="layout">
      <div data-include="sidebar"></div>
      <main class="main">
        <header class="page-header">
          <h1 class="page-title">Contact</h1>
          <p class="page-lead">Subscribe to updates — handled by <code>POST /api/subscribe</code>.</p>
        </header>
        <form id="newsletter-form" class="form">
          <label>
            Email
            <input type="email" name="email" required autocomplete="email" />
          </label>
          <button type="submit" class="btn btn--primary">Subscribe</button>
          <p id="newsletter-msg" class="form-msg" role="status"></p>
        </form>
        <article class="prose" style="margin-top: 2rem">
          <p class="muted">
            For production, configure CORS and the API base URL. Set <code>window.BLOG_API_ORIGIN</code> or
            <code>window.STS_API_ORIGIN</code> before <code>api.js</code> if your API lives on another host.
          </p>
        </article>
      </main>
    </div>
    <div data-include="footer"></div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
