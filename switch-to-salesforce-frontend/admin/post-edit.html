<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit post — Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-app" id="admin-app">
      <aside class="admin-sidebar" id="admin-sidebar"></aside>
      <div class="admin-main">
        <header class="admin-topbar">
          <button type="button" class="admin-sidebar-toggle" id="admin-sidebar-toggle" aria-label="Open menu">Menu</button>
          <h1 class="admin-topbar__title" id="head">Blog post</h1>
        </header>
        <main class="admin-content">
          <div id="msg"></div>
          <div class="admin-split admin-split--2">
            <form id="form" class="admin-form admin-card">
              <input type="hidden" id="post-id" />
              <label>Title <input name="title" id="f-title" required /></label>
              <label>Slug <input name="slug" id="f-slug" /></label>
              <label>Author <input name="author" id="f-author" required /></label>
              <label>Category <select name="category" id="f-cat" required></select></label>
              <label>Excerpt <textarea name="excerpt" id="f-excerpt" rows="3"></textarea></label>
              <label>Tags <input name="tags" id="f-tags" placeholder="comma separated" /></label>
              <label>Cover image URL <input name="coverImage" id="f-cover" /></label>
              <label
                ><input type="checkbox" name="published" id="f-published" checked /> Published</label
              >
              <label>Body <textarea name="body" id="f-body" class="markdown-lg" rows="16"></textarea></label>
              <div class="admin-actions">
                <button type="submit" class="admin-btn">Save</button>
                <a href="posts.html" class="admin-btn admin-btn--ghost">Back</a>
              </div>
            </form>
            <div class="admin-card">
              <h2>Preview</h2>
              <div id="preview" class="preview-pane prose"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="js/admin-core.js"></script>
    <script src="js/admin-api.js"></script>
    <script src="js/tinymce-init.js"></script>
    <script src="js/admin-ui.js"></script>
    <script>
      (function () {
        AdminUi.bootstrap({ active: 'posts' });
        if (!AdminApi.requireAuth()) return;

        var slugParam = new URLSearchParams(window.location.search).get('slug');

        function bindPreview(editor) {
          var el = document.getElementById('preview');
          function render() {
            el.innerHTML = editor.getContent();
          }
          editor.on('change keyup undo redo SetContent', render);
          render();
        }

        fetch(AdminApi.apiOrigin() + '/api/categories')
          .then(function (r) {
            return r.json();
          })
          .then(function (res) {
            var cats = res.data || [];
            document.getElementById('f-cat').innerHTML = cats
              .map(function (c) {
                return '<option value="' + c._id + '">' + c.name + '</option>';
              })
              .join('');
            if (slugParam) {
              document.getElementById('head').textContent = 'Edit post';
              return AdminApi.api('/api/admin/posts/' + encodeURIComponent(slugParam), {
                headers: AdminApi.authHeaders(),
              }).then(function (res) {
                var p = res.data;
                document.getElementById('post-id').value = p._id;
                document.getElementById('f-title').value = p.title || '';
                document.getElementById('f-slug').value = p.slug || '';
                document.getElementById('f-author').value = p.author || '';
                document.getElementById('f-cat').value = p.category && p.category._id ? p.category._id : p.category;
                document.getElementById('f-excerpt').value = p.excerpt || '';
                document.getElementById('f-tags').value = (p.tags || []).join(', ');
                document.getElementById('f-cover').value = p.coverImage || '';
                document.getElementById('f-published').checked = p.published !== false;
                document.getElementById('f-body').value = p.content || '';
              });
            }
            document.getElementById('head').textContent = 'New post';
          })
          .then(function () {
            if (window.StsTinyMce) {
              StsTinyMce.init({
                fieldId: 'f-body',
                onReady: bindPreview,
              });
            }
          })
          .catch(function (err) {
            document.getElementById('msg').innerHTML =
              '<div class="admin-msg admin-msg--error">' + (err.message || 'Load failed') + '</div>';
          });

        document.getElementById('form').addEventListener('submit', function (e) {
          e.preventDefault();
          var id = document.getElementById('post-id').value;
          var html = window.StsTinyMce ? StsTinyMce.getContent('f-body') : document.getElementById('f-body').value;
          var tagsRaw = document.getElementById('f-tags').value || '';
          var tags = tagsRaw
            .split(',')
            .map(function (t) {
              return t.trim();
            })
            .filter(Boolean);
          var payload = {
            title: document.getElementById('f-title').value,
            slug: document.getElementById('f-slug').value || undefined,
            content: html,
            excerpt: document.getElementById('f-excerpt').value || '',
            author: document.getElementById('f-author').value,
            category: document.getElementById('f-cat').value,
            tags: tags,
            coverImage: document.getElementById('f-cover').value || '',
            published: document.getElementById('f-published').checked,
          };

          if (id) {
            AdminApi.api('/api/posts/' + encodeURIComponent(id), {
              method: 'PUT',
              headers: AdminApi.authHeaders(),
              body: JSON.stringify(payload),
            })
              .then(function () {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--ok">Saved.</div>';
              })
              .catch(function (err) {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
              });
          } else {
            AdminApi.api('/api/posts', {
              method: 'POST',
              headers: AdminApi.authHeaders(),
              body: JSON.stringify(payload),
            })
              .then(function (res) {
                var p = res.data;
                document.getElementById('post-id').value = p._id;
                document.getElementById('f-slug').value = p.slug;
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--ok">Created.</div>';
                history.replaceState({}, '', 'post-edit.html?slug=' + encodeURIComponent(p.slug));
              })
              .catch(function (err) {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
              });
          }
        });
      })();
    </script>
  </body>
</html>
