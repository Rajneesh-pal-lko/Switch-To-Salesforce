<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media — Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-app" id="admin-app">
      <aside class="admin-sidebar" id="admin-sidebar"></aside>
      <div class="admin-main">
        <header class="admin-topbar">
          <button type="button" class="admin-sidebar-toggle" id="admin-sidebar-toggle" aria-label="Open menu">Menu</button>
          <h1 class="admin-topbar__title">Media</h1>
        </header>
        <main class="admin-content">
          <p class="muted">Files are stored under <code>/uploads</code> on the API server. Use the URL in articles or posts.</p>
          <div id="msg"></div>
          <div class="admin-card">
            <h2>Upload image</h2>
            <form id="up" class="admin-form">
              <label>Image <input type="file" name="file" accept="image/*" required /></label>
              <button type="submit" class="admin-btn">Upload</button>
            </form>
            <div id="result"></div>
          </div>
        </main>
      </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="js/admin-core.js"></script>
    <script src="js/admin-api.js"></script>
    <script src="js/admin-ui.js"></script>
    <script>
      (function () {
        AdminUi.bootstrap({ active: 'media' });
        if (!window.AdminData) return;

        document.getElementById('up').addEventListener('submit', function (e) {
          e.preventDefault();
          var fd = new FormData();
          var file = e.target.querySelector('[name=file]').files[0];
          if (!file) return;
          fd.append('file', file);
          AdminData.uploadMedia(fd)
            .then(function (data) {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--ok">Uploaded.</div>';
              document.getElementById('result').innerHTML =
                '<p><strong>URL:</strong> <code id="copy-url">' +
                (data.url || '') +
                '</code> <button type="button" class="admin-btn admin-btn--ghost" id="copy-btn">Copy</button></p>' +
                (data.absoluteUrl
                  ? '<p><strong>Absolute:</strong> <code>' + data.absoluteUrl + '</code></p>'
                  : '');
              document.getElementById('copy-btn').addEventListener('click', function () {
                var u = document.getElementById('copy-url').textContent;
                navigator.clipboard.writeText(u);
              });
            })
            .catch(function (err) {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
            });
        });
      })();
    </script>
  </body>
</html>
