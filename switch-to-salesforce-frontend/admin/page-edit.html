<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit page — Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      <nav class="admin-nav">
        <span class="admin-nav__title">Admin</span>
        <a href="index.html">Dashboard</a>
        <a href="sidebar-topics.html">Sidebar</a>
        <a href="pages.html">Pages</a>
        <a href="posts.html">Posts</a>
        <a href="categories.html">Categories</a>
        <a href="media.html">Media</a>
        <a href="#" id="logout">Log out</a>
      </nav>
      <h1 id="page-title">CMS page</h1>
      <div id="msg"></div>
      <form id="form" class="admin-form admin-card">
        <input type="hidden" name="id" id="field-id" />
        <label>Title <input name="title" id="field-title" required /></label>
        <label>Slug <input name="slug" id="field-slug" placeholder="url-segment" /></label>
        <label>Topic <select name="topicId" id="field-topic" required></select></label>
        <label>Category <small class="muted">(optional)</small> <select name="category" id="field-cat"><option value="">—</option></select></label>
        <label>Author <input name="author" id="field-author" /></label>
        <label>Cover image URL <input name="coverImage" id="field-cover" placeholder="/uploads/..." /></label>
        <label>Content (HTML) <textarea name="content" id="field-content" class="markdown-lg" rows="16" required></textarea></label>
        <div class="admin-actions">
          <button type="submit" class="admin-btn">Save</button>
          <a href="pages.html" class="admin-btn admin-btn--ghost">Cancel</a>
          <button type="button" class="admin-btn admin-btn--danger" id="btn-del" hidden>Delete</button>
        </div>
      </form>
    </div>
    <script src="../js/config.js"></script>
    <script src="js/admin-core.js"></script>
    <script>
      (function () {
        if (!AdminApi.requireAuth()) return;
        document.getElementById('logout').addEventListener('click', function (e) {
          e.preventDefault();
          AdminApi.clearToken();
          window.location.href = 'login.html';
        });

        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');

        Promise.all([
          fetch(AdminApi.apiOrigin() + '/api/sidebar-topics').then(function (r) {
            return r.json();
          }),
          fetch(AdminApi.apiOrigin() + '/api/categories').then(function (r) {
            return r.json();
          }),
        ])
          .then(function (results) {
            var topics = (results[0].data || []).map(function (t) {
              return { id: t._id, label: t.name + ' (' + t.slug + ')' };
            });
            var cats = results[1].data || [];
            var ts = document.getElementById('field-topic');
            ts.innerHTML = topics
              .map(function (t) {
                return '<option value="' + t.id + '">' + t.label + '</option>';
              })
              .join('');
            var cs = document.getElementById('field-cat');
            cs.innerHTML =
              '<option value="">—</option>' +
              cats
                .map(function (c) {
                  return '<option value="' + c._id + '">' + c.name + '</option>';
                })
                .join('');

            if (id) {
              document.getElementById('page-title').textContent = 'Edit page';
              document.getElementById('btn-del').hidden = false;
              return AdminApi.api('/api/admin/pages/' + encodeURIComponent(id), {
                headers: AdminApi.authHeaders(),
              }).then(function (res) {
                var p = res.data;
                document.getElementById('field-id').value = p._id;
                document.getElementById('field-title').value = p.title || '';
                document.getElementById('field-slug').value = p.slug || '';
                document.getElementById('field-topic').value = p.topicId && p.topicId._id ? p.topicId._id : p.topicId;
                document.getElementById('field-cat').value = p.category && p.category._id ? p.category._id : p.category || '';
                document.getElementById('field-author').value = p.author || '';
                document.getElementById('field-cover').value = p.coverImage || '';
                document.getElementById('field-content').value = p.content || '';
              });
            }
            document.getElementById('page-title').textContent = 'New page';
          })
          .catch(function (err) {
            document.getElementById('msg').innerHTML =
              '<div class="admin-msg admin-msg--error">' + (err.message || 'Load failed') + '</div>';
          });

        document.getElementById('form').addEventListener('submit', function (e) {
          e.preventDefault();
          var fd = new FormData(e.target);
          var pageId = fd.get('id');
          var payload = {
            title: fd.get('title'),
            slug: fd.get('slug') || undefined,
            content: fd.get('content'),
            topicId: fd.get('topicId'),
            author: fd.get('author') || '',
            coverImage: fd.get('coverImage') || '',
          };
          var cat = fd.get('category');
          payload.category = cat || null;

          if (pageId) {
            AdminApi.api('/api/pages/' + encodeURIComponent(pageId), {
              method: 'PUT',
              headers: AdminApi.authHeaders(),
              body: JSON.stringify(payload),
            })
              .then(function () {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--ok">Saved.</div>';
              })
              .catch(function (err) {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
              });
          } else {
            AdminApi.api('/api/pages', {
              method: 'POST',
              headers: AdminApi.authHeaders(),
              body: JSON.stringify(payload),
            })
              .then(function (res) {
                var nid = res.data && res.data._id;
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--ok">Created. <a href="page-edit.html?id=' +
                  nid +
                  '">Continue editing</a></div>';
                if (nid) {
                  document.getElementById('field-id').value = nid;
                  document.getElementById('btn-del').hidden = false;
                  history.replaceState({}, '', 'page-edit.html?id=' + encodeURIComponent(nid));
                }
              })
              .catch(function (err) {
                document.getElementById('msg').innerHTML =
                  '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
              });
          }
        });

        document.getElementById('btn-del').addEventListener('click', function () {
          var id = document.getElementById('field-id').value;
          if (!id || !confirm('Delete this page?')) return;
          AdminApi.api('/api/pages/' + encodeURIComponent(id), {
            method: 'DELETE',
            headers: AdminApi.authHeaders(),
          }).then(function () {
            window.location.href = 'pages.html';
          });
        });
      })();
    </script>
  </body>
</html>
