<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar — Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      <nav class="admin-nav">
        <span class="admin-nav__title">Admin</span>
        <a href="index.html">Dashboard</a>
        <a href="sidebar-topics.html">Sidebar</a>
        <a href="pages.html">Pages</a>
        <a href="posts.html">Posts</a>
        <a href="categories.html">Categories</a>
        <a href="media.html">Media</a>
        <a href="#" id="logout">Log out</a>
      </nav>
      <h1>Sidebar groups &amp; topics</h1>
      <div id="msg"></div>
      <div class="admin-split admin-split--2">
        <div class="admin-card">
          <h2>Add group</h2>
          <form id="form-group" class="admin-form">
            <label>Name <input name="name" required /></label>
            <label>Order <input name="order" type="number" value="0" /></label>
            <button type="submit" class="admin-btn">Create group</button>
          </form>
        </div>
        <div class="admin-card">
          <h2>Add topic</h2>
          <form id="form-topic" class="admin-form">
            <label>Group <select name="groupId" id="topic-group" required></select></label>
            <label>Name <input name="name" required /></label>
            <label>Slug <small class="muted">(optional)</small> <input name="slug" placeholder="auto from name" /></label>
            <label>Order <input name="order" type="number" value="0" /></label>
            <button type="submit" class="admin-btn">Create topic</button>
          </form>
        </div>
      </div>
      <div class="admin-card">
        <h2>Current structure</h2>
        <div id="tree"></div>
      </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="js/admin-core.js"></script>
    <script>
      (function () {
        if (!AdminApi.requireAuth()) return;
        document.getElementById('logout').addEventListener('click', function (e) {
          e.preventDefault();
          AdminApi.clearToken();
          window.location.href = 'login.html';
        });

        function loadTree() {
          return fetch(AdminApi.apiOrigin() + '/api/sidebar-groups/tree')
            .then(function (r) {
              return r.json();
            })
            .then(function (res) {
              var groups = res.data || [];
              var sel = document.getElementById('topic-group');
              sel.innerHTML = groups
                .map(function (g) {
                  return '<option value="' + g._id + '">' + g.name + '</option>';
                })
                .join('');
              var html =
                '<table class="admin-table"><thead><tr><th>Group</th><th>Topics</th><th></th></tr></thead><tbody>';
              groups.forEach(function (g) {
                var topics = g.topics || [];
                topics.forEach(function (t, i) {
                  html +=
                    '<tr><td>' +
                    (i === 0 ? g.name : '') +
                    '</td><td>' +
                    t.name +
                    ' <code>' +
                    t.slug +
                    '</code></td><td><button type="button" class="admin-btn admin-btn--danger admin-btn--sm" data-del-topic="' +
                    t._id +
                    '">Delete</button></td></tr>';
                });
                if (!topics.length) {
                  html +=
                    '<tr><td>' +
                    g.name +
                    '</td><td colspan="2" class="muted">No topics</td></tr>';
                }
                html +=
                  '<tr class="muted"><td colspan="3"><button type="button" class="admin-btn admin-btn--ghost" data-del-group="' +
                  g._id +
                  '">Delete group “' +
                  g.name +
                  '”</button></td></tr>';
              });
              html += '</tbody></table>';
              document.getElementById('tree').innerHTML = html || '<p class="muted">No groups yet.</p>';
              document.querySelectorAll('[data-del-topic]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                  if (!confirm('Delete this topic?')) return;
                  AdminApi.api('/api/sidebar-topics/' + btn.getAttribute('data-del-topic'), {
                    method: 'DELETE',
                    headers: AdminApi.authHeaders(),
                  }).then(loadTree);
                });
              });
              document.querySelectorAll('[data-del-group]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                  if (!confirm('Delete this group and all its topics?')) return;
                  AdminApi.api('/api/sidebar-groups/' + btn.getAttribute('data-del-group'), {
                    method: 'DELETE',
                    headers: AdminApi.authHeaders(),
                  }).then(loadTree);
                });
              });
            });
        }

        document.getElementById('form-group').addEventListener('submit', function (e) {
          e.preventDefault();
          var fd = new FormData(e.target);
          AdminApi.api('/api/sidebar-groups', {
            method: 'POST',
            headers: AdminApi.authHeaders(),
            body: JSON.stringify({
              name: fd.get('name'),
              order: fd.get('order') ? Number(fd.get('order')) : 0,
            }),
          })
            .then(function () {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--ok">Group created.</div>';
              e.target.reset();
              return loadTree();
            })
            .catch(function (err) {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
            });
        });

        document.getElementById('form-topic').addEventListener('submit', function (e) {
          e.preventDefault();
          var fd = new FormData(e.target);
          var payload = {
            name: fd.get('name'),
            groupId: fd.get('groupId'),
            order: fd.get('order') ? Number(fd.get('order')) : 0,
          };
          var slug = fd.get('slug');
          if (slug && String(slug).trim()) payload.slug = String(slug).trim();
          AdminApi.api('/api/sidebar-topics', {
            method: 'POST',
            headers: AdminApi.authHeaders(),
            body: JSON.stringify(payload),
          })
            .then(function () {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--ok">Topic created.</div>';
              e.target.reset();
              return loadTree();
            })
            .catch(function (err) {
              document.getElementById('msg').innerHTML =
                '<div class="admin-msg admin-msg--error">' + err.message + '</div>';
            });
        });

        loadTree();
      })();
    </script>
  </body>
</html>
