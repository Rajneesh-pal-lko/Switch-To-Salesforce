# Render Blueprint — add secrets in the dashboard: MONGODB_URI, JWT_SECRET (required).
# After first deploy, set SITE_URL to your Render service URL (Settings → copy URL).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: switch-to-salesforce-api
    runtime: node
    plan: free
    rootDir: switch-to-salesforce-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Must match the browser origin of your deployed static site (CORS). No trailing slash.
      - key: FRONTEND_URL
        value: https://switch-to-salesforce.vercel.app
      - key: CORS_ALLOW_VERCEL
        value: "true"
